# Local PostgreSQL for development.
# Run: docker compose up -d, then set DATABASE_URL in .env to the string below.
services:
  postgres:
    image: postgres:16
    container_name: taskforge-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: taskforge
      POSTGRES_PASSWORD: taskforge
      POSTGRES_DB: taskforge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskforge -d taskforge"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
