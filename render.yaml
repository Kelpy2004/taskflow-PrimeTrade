services:
  - type: web
    name: taskforge-fullstack
    runtime: node
    rootDir: .
    buildCommand: npm run render:build
    startCommand: npm run render:start
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_URL
        sync: false
      - key: NODE_ENV
        value: production
